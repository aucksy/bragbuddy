name: Android Debug APK

# Builds an installable DEBUG APK in the cloud — no signing secrets required.
# This machine cannot build Android locally, so CI is the only build path: push, download the
# artifact from the run, install it on the phone.
#
# Runs on every push to main and can also be started manually from the Actions tab.

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.10.2
          fi
          chmod +x gradlew

      - name: Run unit tests
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-test.log

      # This dev machine can read the public API (annotations) but NOT run logs (auth-gated) —
      # surface compile errors / failing tests as ::error:: annotations so failures are diagnosable.
      - name: Surface test failures as annotations
        if: failure()
        run: |
          {
            grep -E "^e: " /tmp/gradle-test.log | head -10
            grep -E "> Task .* FAILED" /tmp/gradle-test.log | head -5
            grep -B1 -A6 "FAILURE: Build failed" /tmp/gradle-test.log | head -15
            find app/build/test-results -name "*.xml" 2>/dev/null | while read -r f; do
              if grep -q "<failure" "$f"; then
                echo "TEST FAILED: $(basename "$f")"
                grep -o '<failure message="[^"]*"' "$f" | cut -c1-400 | head -3
              fi
            done
          } | head -30 | while IFS= read -r line; do echo "::error::${line}"; done
          true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          for f in app/build/outputs/apk/debug/*.apk; do [ -f "$f" ] && cp "$f" "dist/BragBuddy-debug.apk"; done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BragBuddy-debug-apk
          path: dist/BragBuddy-debug.apk
          if-no-files-found: error
