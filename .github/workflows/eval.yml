name: AI Eval

# Runs the BragBuddy AI eval harness (eval/run.mjs) against the live Groq API and uploads the
# report. It spends real API tokens, so it never runs on ordinary pushes — only when explicitly
# asked, via EITHER of two triggers:
#
#   • Tag-driven (the normal path, same as every build in this repo):
#       push a tag  eval-baseline-*  → run suite=all AND commit the result as the baseline
#       push a tag  eval-run-*       → run suite=all as a gate check (must meet/beat the baseline)
#   • Manual (Actions → Run workflow): pick the suite + the commit-baseline checkbox by hand.
#
# OWNER GATE: add the repository secret GROQ_API_KEY (Settings → Secrets and variables → Actions)
# — the same Groq key the app uses. Without it the run fails fast with a clear message.
#
# The committed baseline (eval/report-baseline.{md,json}) is what every AI-prompt phase (AI-1,
# AI-2, …) must meet or beat (docs/IMPLEMENTATION-PLAN.md). A baseline run is allowed to miss
# thresholds (it is the "before" measurement), so it never fails the job; a gate run fails the job
# when a gate fails — that is the eval acting as the ship gate.

on:
  workflow_dispatch:
    inputs:
      commit_baseline:
        description: 'Commit the report as eval/report-baseline.{md,json} (the "before" for the next AI phase)'
        type: boolean
        default: false
      suite:
        description: 'Which golden suite to run'
        type: choice
        options: [all, categorizer, coach, summary]
        default: all
  push:
    tags:
      - 'eval-baseline-*'   # run + commit the baseline
      - 'eval-run-*'        # run as a gate check (no commit)

permissions:
  contents: write   # required only when a baseline is committed

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      # Always operate on main: the eval measures main, and a baseline commit must land on main.
      # (Tags are cut from the main tip, so this runs the same code the tag points at.)
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Normalise the two trigger shapes (dispatch inputs vs. tag name) into one set of outputs.
      - name: Resolve run config
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "commit_baseline=${{ inputs.commit_baseline }}" >> "$GITHUB_OUTPUT"
            echo "suite=${{ inputs.suite }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.ref_name }}" in
              eval-baseline-*) echo "commit_baseline=true"  >> "$GITHUB_OUTPUT" ;;
              *)               echo "commit_baseline=false" >> "$GITHUB_OUTPUT" ;;
            esac
            echo "suite=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Check secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::Repository secret GROQ_API_KEY is not set — add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run eval
        id: run
        continue-on-error: true   # the report + artifact must land even on a red gate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          ONLY=""
          if [ "${{ steps.cfg.outputs.suite }}" != "all" ] && [ -n "${{ steps.cfg.outputs.suite }}" ]; then
            ONLY="--only ${{ steps.cfg.outputs.suite }}"
          fi
          # Gate runs also compare against the committed baseline (the ship rule). Baseline-commit
          # runs skip the comparison — they ARE the new baseline.
          BASELINE=""
          if [ "${{ steps.cfg.outputs.commit_baseline }}" != "true" ] && [ -f eval/report-baseline.json ]; then
            BASELINE="--baseline eval/report-baseline.json"
          fi
          node eval/run.mjs $ONLY $BASELINE

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            eval/report.md
            eval/report.json
          if-no-files-found: error

      - name: Print report to the job summary
        if: always()
        run: cat eval/report.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Commit as baseline
        if: ${{ steps.cfg.outputs.commit_baseline == 'true' && steps.cfg.outputs.suite == 'all' }}
        run: |
          cp eval/report.md eval/report-baseline.md
          cp eval/report.json eval/report-baseline.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eval/report-baseline.md eval/report-baseline.json
          git commit -m "eval: commit baseline report (Phase AI-0)" || { echo "Nothing changed — baseline already current."; exit 0; }
          git push origin HEAD:main

      - name: Refuse partial baseline
        if: ${{ steps.cfg.outputs.commit_baseline == 'true' && steps.cfg.outputs.suite != 'all' }}
        run: |
          echo "::error::A baseline must cover ALL suites — re-run with suite=all."
          exit 1

      - name: Gate
        if: ${{ steps.cfg.outputs.commit_baseline != 'true' }}
        run: |
          if [ "${{ steps.run.outcome }}" = "failure" ]; then
            echo "::error::Eval gates FAILED — see the report artifact / job summary."
            exit 1
          fi
          echo "Eval gates passed."
